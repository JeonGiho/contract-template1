<style>
.cw-wrap{width:100%;padding:16px 0}
.cw-btn{display:flex;justify-content:space-between;align-items:center;padding:26px 32px;border-radius:16px;cursor:pointer;border:none;width:100%;text-align:left;background:#7d3c00;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.15);font-family:inherit;transition:transform .2s,box-shadow .2s}
.cw-btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.2)}
.cw-btn-left{display:flex;flex-direction:column;gap:6px}
.cw-btn-title{font-size:20px;font-weight:700;color:#fff}
.cw-btn-sub{font-size:14px;color:rgba(255,255,255,.85)}
.cw-btn-icon{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:14px}
.cw-btn-icon svg{width:20px;height:20px;stroke:#fff}
#cwOverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:2147483647;background:rgba(0,0,0,.6);overflow-y:auto;-webkit-overflow-scrolling:touch;pointer-events:all}
#cwOverlay.open{display:block}
.cw-modal-wrap{min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px 80px;box-sizing:border-box}
.cw-modal{background:#fff;border-radius:16px;width:100%;max-width:680px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:cwIn .22s ease;position:relative;z-index:1;pointer-events:all}
@keyframes cwIn{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.cw-mhd{background:#7d3c00;color:#fff;padding:18px 22px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center}
.cw-mhd h2{font-size:16px;font-weight:700}
.cw-xbtn{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:7px;cursor:pointer;font-size:18px;line-height:1;font-family:inherit;pointer-events:all}
.cw-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px}
.cw-sec{font-size:12px;font-weight:700;color:#7d3c00;padding:7px 11px;background:#eaf0f8;border-radius:6px;border-left:3px solid #7d3c00}
.cw-g{display:grid;gap:10px}
.cw-g2{grid-template-columns:1fr 1fr}
.cw-g3{grid-template-columns:1fr 1fr 1fr}
.cw-f{position:relative;pointer-events:all}
.cw-f label{display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:3px}
.cw-f .req{color:#e74c3c}
.cw-f input,.cw-f select{width:100%;padding:8px 10px;border:1px solid #ccd4de;border-radius:6px;font-size:13px;font-family:inherit;outline:none;transition:border .2s;position:relative;z-index:1;pointer-events:all;background:#fff;box-sizing:border-box}
.cw-f input:focus,.cw-f select:focus{border-color:#7d3c00;box-shadow:0 0 0 2px rgba(0,0,0,.08)}
.cw-f .hint{font-size:10px;color:#999;margin-top:3px}
.cw-rg{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px;pointer-events:all}
.cw-rg label{font-size:12px;font-weight:500;color:#333;cursor:pointer;padding:6px 11px;border:1px solid #ccd4de;border-radius:14px;transition:all .15s;user-select:none;white-space:nowrap;pointer-events:all;position:relative;z-index:1}
.cw-rg label.on{background:#7d3c00;color:#fff;border-color:#7d3c00}
.cw-rg input[type=radio]{display:none}
.cw-dlbtn{width:100%;padding:14px;background:#7d3c00;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;position:relative;z-index:1;pointer-events:all;display:block;box-sizing:border-box}
.cw-dlbtn:hover{background:#6e3500}
.cw-dlbtn:disabled{background:#aaa;cursor:not-allowed}
.cw-err{display:none;background:#fee;border:1px solid #f88;border-radius:6px;padding:10px;font-size:12px;color:#c00;margin-top:4px}

.cw-date-wrap{display:flex;align-items:center;gap:2px;width:100%;border:1px solid #ccd4de;border-radius:6px;padding:0 8px;background:#fff;transition:border .2s;box-sizing:border-box}
.cw-date-wrap:focus-within{border-color:#7d3c00;box-shadow:0 0 0 2px rgba(0,0,0,.08)}
.cw-date-wrap input[type=number]{border:none;outline:none;background:transparent;font-size:13px;font-family:inherit;padding:8px 0;text-align:center;-moz-appearance:textfield;flex-shrink:0}
.cw-date-wrap input[type=number]::-webkit-outer-spin-button,.cw-date-wrap input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.cw-date-wrap .cw-dy{width:44px}
.cw-date-wrap .cw-dm{width:26px}
.cw-date-wrap .cw-dd{width:26px}
.cw-date-wrap .sep{color:#aaa;font-size:12px;flex-shrink:0}
@media(max-width:560px){.cw-g2,.cw-g3{grid-template-columns:1fr}}
</style>

<script>
(function(){
  var URLS=['https://jeongiho.github.io/contract-template1/template_hourly.js','https://cdn.jsdelivr.net/gh/JeonGiho/contract-template1@main/template_hourly.js'];
  function $(id){return document.getElementById(id);}
  function v(id){var e=$(id);return e?e.value.trim():'';}
  function rv(n){var e=document.querySelector('input[name="'+n+'"]:checked');return e?e.value:'';}
  function ck(val){return val?'■':'□';}
  function fmtDate(s){if(!s)return'';var p=s.split('-');return p[0]+'년 '+p[1]+'월 '+p[2]+'일';}
  function showErr(msg){var e=$('cwErr');e.textContent=msg;e.style.display='block';}
  function resetBtn(){var b=$('cwDlBtn');b.disabled=false;b.innerHTML='&#128229; 계약서 다운로드 (.hml)';}
  function cwOpen(){
    var ov=$('cwOverlay');
    if(ov.parentNode!==document.body)document.body.appendChild(ov);
    ov.classList.add('open');document.body.style.overflow='hidden';
  }
  function cwClose(){$('cwOverlay').classList.remove('open');document.body.style.overflow='';}
  function cwPick(lb){
    lb.parentElement.querySelectorAll('label').forEach(function(l){l.classList.remove('on');});
    lb.classList.add('on');lb.querySelector('input[type=radio]').checked=true;
  }
  function loadTmpl(urls,idx,cb){
    if(idx>=urls.length){showErr('템플릿 로드 실패. 1~2분 후 재시도해주세요.');resetBtn();return;}
    var old=document.getElementById('cwSc');if(old)old.parentNode.removeChild(old);
    window.HML_TMPL=null;
    var sc=document.createElement('script');sc.id='cwSc';sc.src=urls[idx]+'?t='+Date.now();
    sc.onload=function(){if(window.HML_TMPL&&window.HML_TMPL.length>100)cb(window.HML_TMPL);else loadTmpl(urls,idx+1,cb);};
    sc.onerror=function(){loadTmpl(urls,idx+1,cb);};
    document.head.appendChild(sc);
  }
  function getDate(id){
    var y=v(id+'_y'),m=v(id+'_m'),d=v(id+'_d');
    if(!y||!m||!d)return'';
    return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  }
  /* 계약종료일 기본값: 당해연도 12월 31일 */
  function initEndDate(){
    var ey=$('cw_계약종료일_y'),em=$('cw_계약종료일_m'),ed=$('cw_계약종료일_d'),eh=$('cw_계약종료일');
    if(ey&&!ey.value){
      var yr=new Date().getFullYear();
      ey.value=yr;em.value=12;ed.value=31;
      if(eh)eh.value=yr+'-12-31';
    }
  }
  function generate(){
    $('cwErr').style.display='none';
    var 센터명=v('cw_센터명'),대표명=v('cw_대표명');
    var 근로자=v('cw_근로자');
    var 계약시작일=getDate('cw_계약시작일'),계약종료일=getDate('cw_계약종료일');
    var 최초근로개시일=getDate('cw_최초근로개시일'),근로계약일=getDate('cw_근로계약일');
    if(!근로자||!센터명||!대표명||!계약시작일||!계약종료일||!근로계약일){
      showErr('필수 항목(*)을 모두 입력해주세요.');return;
    }
    var btn=$('cwDlBtn');btn.disabled=true;btn.textContent='⏳ 로드 중...';

    var 직종=rv('r_직종')||'';
    var 고용형태=rv('r_고용형태')||'정규직';
    var 주휴일=rv('r_주휴일')||'일요일';
    var 고용=rv('r_고용')||'Y';
    var 산재=rv('r_산재')||'Y';
    var 국민=rv('r_국민')||'Y';
    var 퇴직=rv('r_퇴직')||'DC';
    var 동의=rv('r_동의')||'동의';

    loadTmpl(URLS,0,function(hml){
      btn.textContent='⏳ 생성 중...';
      var MAP=[
        ['센터명',센터명],
        ['근로자',근로자],
        ['계약시작일',fmtDate(계약시작일)],
        ['계약종료일',fmtDate(계약종료일)],
        ['최초근로개시일',fmtDate(최초근로개시일)],
        ['근로계약일',fmtDate(근로계약일)],
        ['체크_사복',ck(직종==='사복')],
        ['체크_시설장',ck(직종==='시설장')],
        ['체크_기간제',ck(고용형태==='기간제')],
        ['체크_정규직',ck(고용형태==='정규직')],
        ['체크_토요일',ck(주휴일==='토요일')],
        ['체크_일요일',ck(주휴일==='일요일')],
        ['체크_고용',ck(고용==='Y')],
        ['체크_산재',ck(산재==='Y')],
        ['체크_국민',ck(국민==='Y')],
        ['체크_DC',ck(퇴직==='DC')],
        ['체크_DB',ck(퇴직==='DB')],
        ['체크_퇴직금',ck(퇴직==='퇴직금')],
        ['체크_동의',ck(동의==='동의')],
        ['체크_미동의',ck(동의==='미동의')],
        ['은행명',v('cw_은행명')],
        ['계좌번호',v('cw_계좌번호')],
        ['지급일',v('cw_지급일')],
        ['근로자생년월일',v('cw_근로자생년월일')],
        ['근로자주소',v('cw_근로자주소')],
        ['근로자연락처',v('cw_근로자연락처')],
        ['센터주소',v('cw_센터주소')],
        ['센터연락처',v('cw_센터연락처')],
        ['대표명',대표명],
        ['신규직원교육담당',v('cw_신규직원교육담당')],
        ['근로자직위',v('cw_근로자직위')],
                        ['시설장명',v('cw_시설장명')||''],
        ['시설장',v('cw_시설장')||''],
        ['시설장주민번호',v('cw_시설장주민번호')||''],
        ['근로자주민번호',v('cw_근로자주민번호')||'']
      ];
      var result=hml;
      MAP.forEach(function(pair){result=result.split('#{'+pair[0]+'}').join(pair[1]);});
      result=result.replace(/#\{[^}]+\}/g,'');
      var blob=new Blob([result],{type:'text/xml;charset=utf-8'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;a.download='['+근로계약일.replace(/-/g,'')+']_'+근로자+'_시급제근로계약서.hml';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);resetBtn();cwClose();
    });
  }
  function attachEvents(){
    var ob=$('cwOpenBtn'),cb=$('cwCloseBtn'),db=$('cwDlBtn'),ov=$('cwOverlay');
    if(!ob||!cb||!db||!ov){setTimeout(attachEvents,50);return;}
    ob.addEventListener('click',function(e){e.stopPropagation();cwOpen();initEndDate();});
    cb.addEventListener('click',function(e){e.stopPropagation();cwClose();});
    db.addEventListener('click',function(e){e.stopPropagation();generate();});
    ov.addEventListener('click',function(e){if(e.target===ov||e.target.classList.contains('cw-modal-wrap'))cwClose();});
    ov.querySelectorAll('.cw-rg label').forEach(function(lb){
      lb.addEventListener('click',function(e){e.stopPropagation();cwPick(lb);});
    });
    ['cw_근로자주소','cw_센터주소'].forEach(function(id){
      var el=$(id);
      if(el)el.addEventListener('paste',function(e){
        e.preventDefault();el.style.borderColor='#e74c3c';
        setTimeout(function(){el.style.borderColor='';},2000);
      });
    });
    ['cw_계약시작일','cw_계약종료일','cw_최초근로개시일','cw_근로계약일'].forEach(function(id){
      var ey=$(id+'_y'),em=$(id+'_m'),ed=$(id+'_d'),eh=$(id);
      if(!ey)return;
      function pad2(n){return String(n).padStart(2,'0');}
      function syncH(){var y=ey.value,m=em.value,d=ed.value;if(y&&m&&d)eh.value=y+'-'+pad2(m)+'-'+pad2(d);else eh.value='';}
      ey.addEventListener('input',function(){if(ey.value.length>4)ey.value=ey.value.slice(0,4);if(ey.value.length===4)em.focus();syncH();});
      em.addEventListener('input',function(){if(em.value.length>2)em.value=em.value.slice(0,2);if(parseInt(em.value)>12)em.value='12';if(em.value.length===2)ed.focus();syncH();});
      ed.addEventListener('input',function(){if(ed.value.length>2)ed.value=ed.value.slice(0,2);if(parseInt(ed.value)>31)ed.value='31';syncH();});
    });
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',attachEvents);}
  else{attachEvents();}
})();
</script>
